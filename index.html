<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hotel Regen</title>
    <link rel="stylesheet" href="styles/main.css">
    <script defer src="src/rules.js"></script>
    <script defer src="src/levels.js"></script>
    <script defer src="src/game.js"></script>
    <script defer src="src/renderer.js"></script>
    <script defer src="src/ai.js"></script>
    <script defer src="src/main.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="game-layout" aria-label="Mak-yek game">
        <header class="game-header">
          <div>
            <h1 id="game-title" role="button" tabindex="0" aria-controls="game-controls" aria-expanded="false">Hotel Regen</h1>
            <p id="status" class="status">Drag a piece to an empty square.</p>
          </div>
          <button id="reset-board" class="icon-button" type="button" title="Reset board" aria-label="Reset board">
            Reset
          </button>
        </header>

        <div id="game-controls" class="controls advanced-collapsed" aria-label="Game options">
          <label class="field-control">
            <span>Level</span>
            <select id="level-select"></select>
          </label>

          <label class="toggle-control advanced-control">
            <input id="ai-enabled" type="checkbox">
            <span>Black AI</span>
          </label>

          <label class="field-control advanced-control">
            <span>AI type</span>
            <select id="ai-type">
              <option value="minimax">Minimax</option>
              <option value="greedy">Greedy captures</option>
              <option value="random">Random</option>
            </select>
          </label>

          <label class="field-control advanced-control">
            <span>Depth</span>
            <select id="ai-depth">
              <option value="2" selected>2 ply</option>
            </select>
          </label>

          <label class="toggle-control advanced-control">
            <input id="ponder-enabled" type="checkbox">
            <span>Think on White</span>
          </label>

          <label class="field-control advanced-control">
            <span>Think limit</span>
            <select id="ponder-depth">
              <option value="2" selected>2 ply</option>
            </select>
          </label>

          <label class="toggle-control advanced-control">
            <input id="cache-enabled" type="checkbox" checked>
            <span>Minimax cache</span>
          </label>

          <label class="toggle-control advanced-control">
            <input id="move-list-enabled" type="checkbox">
            <span>Move scores</span>
          </label>
        </div>

        <div class="play-area">
          <div id="board" class="board" aria-label="8 by 7 Mak-yek board"></div>
          <aside id="move-list" class="move-list hidden" aria-label="White thinking move scores"></aside>
        </div>
      </section>
    </main>
  </body>
</html>
